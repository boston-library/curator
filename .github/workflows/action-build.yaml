name: Build branches 

on: [push, pull_request]

jobs:

  build-on-branches:

    runs-on: ubuntu-22.04

    # Define environment variables globally for the job
    env:
      RAILS_ENV: test
      PGHOST: localhost
      PGUSER: postgres
      PGPASSWORD: postgres
      PGPORT: 5432
      NOKOGIRI_USE_SYSTEM_LIBRARIES: true
      INGEST_SOURCE_DIRECTORY: /opt/ingest_source

    # Services start sidecar containers (Postgres) automatically
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          ## POSTGRES_DB: commonwealth_admin_test
        ports:
          - 5432:5432
        # Health check ensures Postgres is ready before the script runs
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with: 
          submodules: true

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          # Automatically reads the .ruby-version file
          ruby-version: 3.3.10
          # Automatically runs 'bundle install' and caches gems
          bundler-cache: true

      - name: Prepare curator fixtures
        run: |
          mkdir -p "$INGEST_SOURCE_DIRECTORY/BPLDC"
          ln -s "$GITHUB_WORKSPACE/spec/fixtures" "$INGEST_SOURCE_DIRECTORY/BPLDC/curator_fixtures"

      # bundle exec rails app:curator:setup
      - name: Run curator setup
        run: |
          bundle exec rails app:db:prepare 
          


      - name: Run Tests
        run: |
          bundle exec rake --trace
